<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test APIs - Departments, Categories, SubCategories</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .test-section {
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }
        .test-section h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 20px;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            margin-right: 10px;
            margin-bottom: 10px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .btn:active {
            transform: translateY(0);
        }
        .results {
            margin-top: 20px;
            padding: 20px;
            background: white;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }
        .metric {
            display: inline-block;
            margin: 10px 20px 10px 0;
            padding: 10px 15px;
            background: #f0f0f0;
            border-radius: 6px;
            font-size: 14px;
        }
        .metric-label {
            color: #666;
            font-weight: 600;
            margin-right: 5px;
        }
        .metric-value {
            color: #333;
            font-weight: bold;
        }
        .status-excellent { color: #28a745; }
        .status-good { color: #17a2b8; }
        .status-acceptable { color: #ffc107; }
        .status-poor { color: #dc3545; }
        .pagination-info {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 6px;
            margin-top: 10px;
            border-left: 4px solid #2196f3;
        }
        .pagination-info h3 {
            color: #1976d2;
            margin-bottom: 10px;
            font-size: 16px;
        }
        .error {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 6px;
            margin-top: 10px;
            border-left: 4px solid #c62828;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 API Performance Testing</h1>
        <p class="subtitle">Test departments, categories, and subcategories APIs with default pagination</p>

        <div class="test-section">
            <h2>📁 Departments API</h2>
            <button class="btn" onclick="testAPI('departments')">Test /api/v1/departments</button>
            <div id="departments-results"></div>
        </div>

        <div class="test-section">
            <h2>📂 Categories API</h2>
            <button class="btn" onclick="testAPI('categories')">Test /api/v1/categories</button>
            <div id="categories-results"></div>
        </div>

        <div class="test-section">
            <h2>📄 SubCategories API</h2>
            <button class="btn" onclick="testAPI('subcategories')">Test /api/v1/subcategories</button>
            <div id="subcategories-results"></div>
        </div>

        <div class="test-section">
            <h2>🔄 Test All APIs</h2>
            <button class="btn" onclick="testAllAPIs()">Run All Tests</button>
        </div>
    </div>

    <script>
        async function testAPI(endpoint) {
            const resultsDiv = document.getElementById(`${endpoint}-results`);
            resultsDiv.innerHTML = '<p>⏳ Testing...</p>';

            const startTime = performance.now();
            
            try {
                const response = await fetch(`http://127.0.0.1:8000/api/v1/${endpoint}`, {
                    headers: {
                        'Accept': 'application/json'
                    }
                });

                const endTime = performance.now();
                const duration = (endTime - startTime).toFixed(2);
                
                const data = await response.json();

                let statusClass = 'status-excellent';
                let statusText = '✅ Excellent';
                if (duration > 500) {
                    statusClass = 'status-poor';
                    statusText = '❌ Poor';
                } else if (duration > 300) {
                    statusClass = 'status-acceptable';
                    statusText = '⚠️ Acceptable';
                } else if (duration > 200) {
                    statusClass = 'status-good';
                    statusText = '✓ Good';
                }

                let html = `
                    <div class="results">
                        <div class="metric">
                            <span class="metric-label">Status:</span>
                            <span class="metric-value ${statusClass}">${statusText}</span>
                        </div>
                        <div class="metric">
                            <span class="metric-label">Load Time:</span>
                            <span class="metric-value">${duration} ms</span>
                        </div>
                        <div class="metric">
                            <span class="metric-label">HTTP Status:</span>
                            <span class="metric-value">${response.status}</span>
                        </div>
                `;

                if (data.pagination) {
                    html += `
                        <div class="pagination-info">
                            <h3>📊 Pagination Info</h3>
                            <div class="metric">
                                <span class="metric-label">Current Page:</span>
                                <span class="metric-value">${data.pagination.current_page}</span>
                            </div>
                            <div class="metric">
                                <span class="metric-label">Per Page:</span>
                                <span class="metric-value">${data.pagination.per_page}</span>
                            </div>
                            <div class="metric">
                                <span class="metric-label">Total Items:</span>
                                <span class="metric-value">${data.pagination.total}</span>
                            </div>
                            <div class="metric">
                                <span class="metric-label">Total Pages:</span>
                                <span class="metric-value">${data.pagination.last_page}</span>
                            </div>
                        </div>
                    `;
                }

                if (data.data && Array.isArray(data.data)) {
                    html += `
                        <div class="metric">
                            <span class="metric-label">Items Returned:</span>
                            <span class="metric-value">${data.data.length}</span>
                        </div>
                    `;
                }

                html += '</div>';
                resultsDiv.innerHTML = html;

            } catch (error) {
                resultsDiv.innerHTML = `
                    <div class="error">
                        <strong>❌ Error:</strong> ${error.message}
                    </div>
                `;
            }
        }

        async function testAllAPIs() {
            await testAPI('departments');
            await new Promise(resolve => setTimeout(resolve, 500));
            await testAPI('categories');
            await new Promise(resolve => setTimeout(resolve, 500));
            await testAPI('subcategories');
        }
    </script>
</body>
</html>
